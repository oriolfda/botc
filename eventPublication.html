<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Publicació Event</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial;background:#121212;color:#f0f0f0;padding:12px}
.header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.container{max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.card{background:#2d2d2d;padding:12px;border-radius:10px}
.preview p{margin:4px 0;color:#d5d5d5}
textarea{width:100%;min-height:110px;padding:10px;border-radius:6px;border:1px solid #444;background:#222;color:#fff}
.actions{display:flex;gap:8px;flex-wrap:wrap}
button{border:none;border-radius:6px;padding:10px 14px;color:#fff;cursor:pointer}
.btnPublish{background:#8e44ad}
.btnPublish:disabled{background:#556a5d;cursor:not-allowed}
.back{background:#2e8b57;color:#fff;border:none;padding:6px;border-radius:6px;cursor:pointer;font-size:0.8rem;text-decoration:none;}
.note{font-size:.9rem;color:#a8a8a8}
#msg{min-height:20px}
</style>
<script src="env.js"></script>
</head>
<body>
<div class="header">
  <h2 style="color:#2e8b57">Publicació d'event</h2>
  <a class="back" id="backLink" href="events.html">Enrere</a>
</div>

<div class="container">
  <div class="card preview" id="preview">Carregant event...</div>
  <div class="card">
    <label for="optionalText" style="display:block;margin-bottom:6px">Text opcional</label>
    <textarea id="optionalText" placeholder="Ex: Porta un amic, hi haurà partida especial..."></textarea>
    <div class="actions" style="margin-top:10px">
      <button id="publishBtn" class="btnPublish">Enviar publicació</button>
    </div>
    <div id="msg" class="note" style="margin-top:8px"></div>
  </div>
</div>

<script>
const BOTC_CONFIG = window.BOTC_CONFIG || {};
const params = new URLSearchParams(window.location.search);
const urlEnv = params.get("env");
const ENV = (urlEnv || BOTC_CONFIG.ENV || "AUTO").toUpperCase();
const event_id = Number(params.get("event_id"));
const access = JSON.parse(localStorage.getItem('botc-access')||'null');
const isInternal = location.hostname.startsWith("192.168.") || location.hostname === "localhost";

document.getElementById('backLink').href = `events.html?env=${encodeURIComponent(ENV)}`;

function resolveApiBase(){
  if (BOTC_CONFIG.API_BASE) return { base: BOTC_CONFIG.API_BASE, prefix: BOTC_CONFIG.API_PREFIX ?? "" };
  if (!isInternal) return { base: window.location.origin, prefix: "/api" };
  if (ENV === "PROD") return { base: "http://192.168.0.210:30081", prefix: "" };
  if (ENV === "TEST") return { base: "http://192.168.0.210:30082", prefix: "" };
  if (location.port === "30084") return { base: "http://192.168.0.210:30082", prefix: "" };
  if (location.port === "8080")  return { base: "http://192.168.0.210:30081", prefix: "" };
  return { base: "http://192.168.0.210:30081", prefix: "" };
}
const { base: API_BASE, prefix: API_PREFIX } = resolveApiBase();

function canPublishEvent(ev){
  if (!access) return false;
  if (access.role === 'superadmin') return true;
  if (access.role === 'admin' && access.group_id === ev.group_id) return true;
  return false;
}

async function loadEvent(){
  const preview = document.getElementById('preview');
  const btn = document.getElementById('publishBtn');
  const msg = document.getElementById('msg');

  if(!event_id || Number.isNaN(event_id)){
    preview.innerHTML = '<span style="color:#ff6b6b">event_id invàlid</span>';
    btn.disabled = true;
    return;
  }

  const res = await fetch(`${API_BASE}${API_PREFIX}/events/${event_id}`);
  if(!res.ok){
    preview.textContent = 'No s\'ha pogut carregar l\'event';
    btn.disabled = true;
    return;
  }

  const ev = await res.json();
  preview.innerHTML = `
    <h3 style="margin-bottom:8px">${ev.name}</h3>
    <p><strong>Data:</strong> ${ev.date || '-'}</p>
    <p><strong>Lloc:</strong> ${ev.location || '-'}</p>
    <p><strong>Participants:</strong> ${ev.participant_count || 0}</p>
    <p><strong>Estat:</strong> ${ev.status || 'active'}</p>
  `;

  if(!canPublishEvent(ev)){
    btn.disabled = true;
    msg.textContent = 'No tens permisos per publicar aquest event.';
  }
}

document.getElementById('publishBtn').addEventListener('click', async ()=>{
  const btn = document.getElementById('publishBtn');
  const msg = document.getElementById('msg');
  const optionalText = document.getElementById('optionalText').value.trim();

  btn.disabled = true;
  msg.textContent = 'Publicant...';

  try{
    const fd = new FormData();
    if(optionalText) fd.append('optional_text', optionalText);
    fd.append('role', access?.role || '');

    const res = await fetch(`${API_BASE}${API_PREFIX}/events/${event_id}/publish`, { method:'POST', body: fd });
    if(!res.ok){
      const err = await res.json().catch(()=>({detail:'Error publicant'}));
      throw new Error(err.detail || 'Error publicant');
    }
    msg.style.color = '#7cd992';
    msg.textContent = 'Publicació enviada correctament.';
    document.getElementById('optionalText').value='';
  }catch(e){
    msg.style.color = '#ff8a8a';
    msg.textContent = e.message || 'Error publicant';
  }finally{
    btn.disabled = false;
  }
});

loadEvent();
</script>
</body>
</html>
